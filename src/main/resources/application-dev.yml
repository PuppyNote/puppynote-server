server:
  servlet:
    context-path: /puppynote

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/puppynote?useSSL=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQL8Dialect
        #        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          exception-handling: ignore
  mail:
    host: smtp.gmail.com
    port: 587
    username: puppynote0330@gmail.com
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true

oauth:
  kakao:
    api:
      url: https://kapi.kakao.com
      name: kakaoApi
  google:
    api:
      url: https://www.googleapis.com
      name: googleApi

jwt:
  secret-key: ${JWT_SECRET_KEY}

aws:
  access-key: ${AWS_ACCESS_KEY}  # AWS IAM Access Key
  secret-key: ${AWS_SECRET_KEY}  # AWS IAM Secret Key
  s3:
    region: ap-northeast-2  # Seoul Region
    bucket:
      puppy-profile: ${PUPPY_PROFILE_BUCKET}  # 사용자 관련 파일 버킷
      walk-photo: ${WALK_PHOTO_BUCKET}  # 산책 사진 버킷
      pet-item-photo: ${PET_ITEM_PHOTO_BUCKET}  # 용품 이미지 버킷
      user-profile: ${USER_PROFILE_BUCKET}  # 사용자 프로필 이미지 버킷
      community-post: ${COMMUNITY_POST_BUCKET}  # 커뮤니티 게시물 이미지 버킷

elasticsearch:
  host: ${ES_HOST}
  port: ${ES_PORT}
  username: ${ES_USERNAME}
  password: ${ES_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  health:
    elasticsearch:
      enabled: false
  metrics:
    tags:
      application: puppynote-dev
